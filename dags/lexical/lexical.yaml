node_descriptions:
  aoa: Subjective age-of-acquisition estimate (years).
  area: Proxy for geographic area a word is known, based on coordinate extremes (area
    index).
  genre_disp: Dispersion across genres as entropy of token frequencies (entropy).
  log_freq: Normalized word frequency, log-transformed (log-frequency).
  log_range: Dispersion across texts as log-transformed text count (log-count).
  prev_heard: Passive lexical prevalence as fraction of speakers who have heard a
    word (proportion).
  prev_used: Active lexical prevalence as fraction of speakers who have used a word
    (proportion).
  social_disp: Social dispersion as entropy of participants' educational status (entropy).
primary_domain_name: Linguistics
secondary_domain_name: Cognitive Science
